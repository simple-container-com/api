name: govulncheck

# Reachability-aware vulnerability scan against every PR + push to main.
# Fails the build if our code calls into a known-vulnerable function in
# any direct or transitive Go dep.
#
# This is the enforcement half of the documented SCA policy in
# docs/DEPENDENCIES.md "Pre-release SCA gate". OpenSSF Baseline
# OSPS-VM-05.03 requires changes to be automatically evaluated against
# a documented policy and blocked on violation, except when declared
# non-exploitable (which we do via vex/openvex.json).
#
# Why govulncheck instead of osv-scanner / Trivy on Go modules:
# govulncheck is the reachability-aware scanner maintained by the Go
# security team. It runs the call-graph against the OSV advisory data
# and reports only vulnerabilities whose symbols are reachable from
# OUR code. Module-level scanners (osv-scanner, Trivy) flag any vuln
# in any transitive dep regardless of whether the vulnerable symbol
# is called — which produces false positives like GO-2022-0635/0646
# (aws-sdk-go v1 s3crypto, transitively pulled in by Pulumi but never
# called). Those false positives are documented in vex/openvex.json
# but govulncheck filters them at the scan level without needing the
# VEX consult.
#
# CI behaviour:
#   - PR: fails if govulncheck reports any reachable vulnerability —
#     but only when the PR actually touches Go (*.go / go.mod / go.sum).
#     A PR that changes no Go input cannot alter reachability, and it
#     cannot change the stdlib version govulncheck reads from the `go`
#     directive in go.mod — so re-scanning a Docker- or Actions-only PR
#     only re-flags whatever already sits on its (possibly stale) base
#     branch. That is exactly how a `go 1.26.3`-based digest/action bump
#     ends up "failing" a stdlib advisory that main already fixed by
#     bumping to 1.26.4. The gate step below skips the scan (and reports
#     success) for those PRs; main-push + the weekly cron still scan
#     unconditionally, so nothing escapes the gate before release.
#   - main push: same gate, always scans; an unfixable transitive that
#     suddenly becomes reachable would block the next release.
#   - Weekly cron: catches newly-published advisories landing against
#     existing reachable code paths.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 6 * * 1'  # Monday 06:37 UTC — early week, off-peak
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read  # gate step lists PR files to decide whether to scan

jobs:
  govulncheck:
    name: govulncheck (reachability-aware)
    runs-on: ubuntu-24.04
    # Locally `govulncheck -mode=source ./...` on this module peaks at
    # ~13.5 GB RSS over ~12 min (full call-graph construction across
    # pulumi v3, k8s.io, aws-sdk-v2, langchaingo, etc — 492 require lines
    # post-PR #279). GH-hosted ubuntu-24.04 has 16 GB RAM minus 2-3 GB
    # for OS + runner agent, so peak crosses the OOM cliff right around
    # the 3-min mark — every prior run on this PR died there with
    # "runner has received a shutdown signal" (the kernel killing the
    # runner agent process). 20 minutes is the soft cap so the GC-paced
    # variant below has room to finish on the first try.
    timeout-minutes: 20
    env:
      # Soft-cap Go's heap so the GC runs more aggressively as we
      # approach the limit. 12 GiB keeps us comfortably below the
      # runner's available RAM. Trades wall time for memory safety.
      GOMEMLIMIT: 12GiB
      # Default GOGC is 100 (collect when heap doubles). 25 collects
      # 4x more often — extra CPU for the assurance that RSS doesn't
      # balloon past GOMEMLIMIT between collection cycles.
      GOGC: "25"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Decide whether to scan
        id: gate
        # Always scan on push/schedule/dispatch. On a PR, scan only when a
        # Go input changed — see the "CI behaviour" note above. The job
        # always runs and always reports, so a required status check named
        # "govulncheck (reachability-aware)" is never left pending; it just
        # reports success without burning ~13 min + 13 GB on a non-Go diff.
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "scan=true" >> "$GITHUB_OUTPUT"
            echo "Event '$EVENT_NAME' → full scan."
            exit 0
          fi
          changed=$(gh api --paginate "repos/${REPO}/pulls/${PR_NUMBER}/files" --jq '.[].filename')
          if printf '%s\n' "$changed" | grep -qE '(\.go$|^go\.mod$|^go\.sum$)'; then
            echo "scan=true" >> "$GITHUB_OUTPUT"
            echo "PR touches Go inputs → full scan."
          else
            echo "scan=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No .go/go.mod/go.sum changes in this PR — govulncheck scan skipped (reachability and stdlib version are unchanged by a non-Go diff)."
          fi

      - name: Set up Go
        if: steps.gate.outputs.scan == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        if: steps.gate.outputs.scan == 'true'
        # SHA-pin govulncheck to satisfy Scorecard's Pinned-Dependencies
        # check (was the sole `goCommand not pinned by hash` warning).
        # v1.3.0 → 0782b76014f15f24e22a438f30f308df42899ba1
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@0782b76014f15f24e22a438f30f308df42899ba1  # v1.3.0
          govulncheck -version

      - name: Run govulncheck on source
        if: steps.gate.outputs.scan == 'true'
        run: |
          set -euo pipefail
          # -mode=source: scan the call graph from this module's main
          # packages outward (reachability-aware). Exits non-zero if
          # any reachable vulnerability is found.
          govulncheck -mode=source ./...
