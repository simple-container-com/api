name: Semgrep
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  semgrep:
    uses: simple-container-com/actions/.github/workflows/semgrep.yml@main
    permissions:
      contents: read
    with:
      # Consumer-rules: SC-api-specific Semgrep rules at .semgrep/rules/.
      # Categories: sigstore (cosign/gh-attestation/attest-build-provenance
      # supply-chain hardening), gha-extras (workflow-misuse), pulumi-iac
      # (K8s + GCP + AWS-extra), go-canon (gosec G-series + dgryski/
      # semgrep-go misses CodeQL security-extended doesn't cover).
      # After 14 days clean here, promote to the shared SC ruleset in
      # simple-container-com/actions/semgrep-scan/rules/.
      consumer-rules: '.semgrep/rules'
      # Curated registry packs covering CI + Go + gosec G-series.
      # `p/secrets` is intentionally NOT opted into: TruffleHog (see
      # security-scan.yml) is our secret-detection source of truth and is
      # already tuned with the `secret-scan-extra-excludes` list for our
      # documented example-secret paths (docs/examples, testdata, .sc/
      # cfg.default.yaml). The Semgrep `p/secrets` pack would re-flag the
      # same fixtures with no path-exclude knob exposed to consumers.
      # Pinned at the action level via Semgrep image digest in
      # semgrep-scan/action.yml; pack content is fetched at runtime.
      registry-packs: 'p/ci,p/golang,p/gosec'
