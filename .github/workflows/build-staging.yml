name: Build GitHub Actions Staging Image (Blacksmith Optimized)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build-staging:
    name: Build Staging Image
    runs-on: blacksmith-8vcpu-ubuntu-2204
    permissions:
      contents: read
      id-token: write       # OIDC for keyless cosign + attest-build-provenance
      attestations: write
    outputs:
      cicd-bot-telegram-token: ${{ steps.prepare-additional-secrets.outputs.cicd-bot-telegram-token }}
      cicd-bot-telegram-chat-id: ${{ steps.prepare-additional-secrets.outputs.cicd-bot-telegram-chat-id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go with Blacksmith caching
        uses: useblacksmith/setup-go@647ac649bd5b480f2a262e3e3e5f4d150ed452ad  # v6.0.1
        with:
          go-version: '1.24'

      - name: Set version for build
        run: |
          VERSION="staging-${{ github.run_number }}-$(date -u +%Y%m%d-%H%M%S)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "🏷️ Set VERSION: $VERSION"

      - name: Cache CLI tools (SC + Welder)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0 (Automatically uses Blacksmith cache on Blacksmith runners)
        with:
          path: |
            ~/.local/bin/sc
            ~/.local/bin/welder
          key: cli-tools-${{ runner.os }}-v1
          restore-keys: |
            cli-tools-${{ runner.os }}-

      - name: install sc tool
        uses: simple-container-com/actions/install-sc@main
      - name: install welder tool
        uses: simple-container-com/actions/install-welder@main

      - name: Prepare secrets for build
        run: |
          cat << EOF > ./.sc/cfg.default.yaml
          ${{ secrets.SC_CONFIG }}
          EOF
          cat << EOF > ./.sc/cfg.test.yaml
          ${{ secrets.SC_CONFIG }}
          EOF
          sc secrets reveal

      - name: Prepare additional secrets for notifications
        id: prepare-additional-secrets
        run: |
          echo "cicd-bot-telegram-token=$(sc stack secret-get -s dist cicd-bot-telegram-token)" >> $GITHUB_OUTPUT
          echo "cicd-bot-telegram-chat-id=$(sc stack secret-get -s dist cicd-bot-telegram-chat-id)" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx with advanced caching
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      - name: Build static github-actions binary with welder (cached Go modules)
        run: |
          echo "Building with VERSION: $VERSION"
          welder run build-github-actions-staging

      - name: Docker login using SC secrets
        run: |
          sc stack secret-get -s dist dockerhub-cicd-token | docker login --username simplecontainer --password-stdin

      - name: Build and push github-actions staging image
        id: build_gha_staging
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: github-actions-staging.Dockerfile
          platforms: linux/amd64
          tags: |
            simplecontainer/github-actions:staging
            simplecontainer/github-actions:${{ github.ref_name }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push caddy staging image
        id: build_caddy_staging
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: caddy.Dockerfile
          platforms: linux/amd64
          tags: |
            simplecontainer/caddy:staging
            simplecontainer/caddy:${{ env.VERSION }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # Phase 2: sign + SBOM + SLSA provenance for staging images. Staging has
      # its OWN trust root (build-staging.yml@refs/heads/staging) — consumers
      # who opt in to `:staging` images verify against the staging identity
      # regex, not the production one (push.yaml@refs/heads/main). See
      # SECURITY.md "Identity regex contract".
      - name: Install attestation tools
        if: steps.build_gha_staging.outcome == 'success' || steps.build_caddy_staging.outcome == 'success'
        uses: ./.github/actions/install-attest-tools

      - name: Generate CycloneDX SBOM for github-actions staging
        id: sbom_gha_staging
        if: steps.build_gha_staging.outcome == 'success'
        continue-on-error: true
        env:
          IMAGE_REF: simplecontainer/github-actions@${{ steps.build_gha_staging.outputs.digest }}
        run: |
          set -euo pipefail
          syft scan "registry:${IMAGE_REF}" -o "cyclonedx-json=sbom-github-actions-staging.cdx.json"

      - name: Generate CycloneDX SBOM for caddy staging
        id: sbom_caddy_staging
        if: steps.build_caddy_staging.outcome == 'success'
        continue-on-error: true
        env:
          IMAGE_REF: simplecontainer/caddy@${{ steps.build_caddy_staging.outputs.digest }}
        run: |
          set -euo pipefail
          syft scan "registry:${IMAGE_REF}" -o "cyclonedx-json=sbom-caddy-staging.cdx.json"

      - name: Cosign sign + attest staging images (keyless)
        id: cosign_staging
        if: steps.build_gha_staging.outcome == 'success' || steps.build_caddy_staging.outcome == 'success'
        continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: "1"
          GHA_REF: simplecontainer/github-actions@${{ steps.build_gha_staging.outputs.digest }}
          CADDY_REF: simplecontainer/caddy@${{ steps.build_caddy_staging.outputs.digest }}
          GHA_OUTCOME: ${{ steps.build_gha_staging.outcome }}
          CADDY_OUTCOME: ${{ steps.build_caddy_staging.outcome }}
          GHA_SBOM_OUTCOME: ${{ steps.sbom_gha_staging.outcome }}
          CADDY_SBOM_OUTCOME: ${{ steps.sbom_caddy_staging.outcome }}
        run: |
          set -uo pipefail
          rc=0
          if [ "$GHA_OUTCOME" = "success" ]; then
            cosign sign --yes "$GHA_REF" || rc=1
            if [ "$GHA_SBOM_OUTCOME" = "success" ]; then
              cosign attest --yes --predicate sbom-github-actions-staging.cdx.json --type cyclonedx "$GHA_REF" || rc=1
            fi
          fi
          if [ "$CADDY_OUTCOME" = "success" ]; then
            cosign sign --yes "$CADDY_REF" || rc=1
            if [ "$CADDY_SBOM_OUTCOME" = "success" ]; then
              cosign attest --yes --predicate sbom-caddy-staging.cdx.json --type cyclonedx "$CADDY_REF" || rc=1
            fi
          fi
          exit "$rc"

      - name: SLSA build provenance for github-actions staging
        id: slsa_gha_staging
        if: steps.build_gha_staging.outcome == 'success'
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: index.docker.io/simplecontainer/github-actions
          subject-digest: ${{ steps.build_gha_staging.outputs.digest }}
          push-to-registry: true

      - name: SLSA build provenance for caddy staging
        id: slsa_caddy_staging
        if: steps.build_caddy_staging.outcome == 'success'
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: index.docker.io/simplecontainer/caddy
          subject-digest: ${{ steps.build_caddy_staging.outputs.digest }}
          push-to-registry: true

      - name: Soft-fail aggregator for staging attestation
        if: always()
        env:
          GHA_SBOM_OUTCOME: ${{ steps.sbom_gha_staging.outcome }}
          CADDY_SBOM_OUTCOME: ${{ steps.sbom_caddy_staging.outcome }}
          COSIGN_OUTCOME: ${{ steps.cosign_staging.outcome }}
          GHA_SLSA_OUTCOME: ${{ steps.slsa_gha_staging.outcome }}
          CADDY_SLSA_OUTCOME: ${{ steps.slsa_caddy_staging.outcome }}
        run: |
          fail=0
          for v in "$GHA_SBOM_OUTCOME" "$CADDY_SBOM_OUTCOME" "$COSIGN_OUTCOME" "$GHA_SLSA_OUTCOME" "$CADDY_SLSA_OUTCOME"; do
            if [ "$v" != "success" ] && [ "$v" != "skipped" ]; then fail=1; fi
          done
          if [ "$fail" -eq 1 ]; then
            echo "::warning title=Staging attestation incomplete::sbom-gha=$GHA_SBOM_OUTCOME sbom-caddy=$CADDY_SBOM_OUTCOME cosign=$COSIGN_OUTCOME slsa-gha=$GHA_SLSA_OUTCOME slsa-caddy=$CADDY_SLSA_OUTCOME"
          else
            echo "Staging attestation complete."
          fi

      - name: Image built successfully
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "🎉 GitHub Actions and Caddy staging images built successfully with BuildKit + GitHub Actions caching!"
          echo ""
          echo "🚀 The staging images are now available:"
          echo "   simplecontainer/github-actions:staging"
          echo "   simplecontainer/github-actions:$REF_NAME"
          echo "   simplecontainer/caddy:staging"
          echo "   simplecontainer/caddy:$VERSION"
          echo ""
          echo "📦 Built with version: $VERSION"
          echo "✅ Your GitHub Actions will now use the updated staging image with your latest changes!"
          echo "⚡ Build was accelerated using:"
          echo "   • Blacksmith runner caching (Go modules, CLI tools)"
          echo "   • Docker BuildKit layer caching (GitHub Actions cache)"
          echo "   • Multi-platform optimized build"
          echo ""
          echo "📝 Next steps:"
          echo "   1. Test your GitHub Actions workflows"
          echo "   2. Push changes to main when ready for production"

  finalize:
    name: Finalize staging build
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - build-staging
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: ${{ always() }}
        with:
          persist-credentials: false

      - name: Extract git reference
        id: extract_git_ref
        if: ${{ always() }}
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.workflow_run.head_commit.message }}
        run: |-
          message="$(printf '%s' "$COMMIT_MESSAGE" | tr -d '\n')"
          echo "branch=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          echo "message=$message" >> $GITHUB_OUTPUT
          echo "author=$GITHUB_ACTOR" >> $GITHUB_OUTPUT
          echo "url=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> $GITHUB_OUTPUT

      - name: Notify Telegram (success)
        if: ${{ success() && !contains(needs.*.result, 'failure') }}
        continue-on-error: true
        uses: simple-container-com/actions/notify-telegram@main
        with:
          chat-id:   ${{ needs.build-staging.outputs.cicd-bot-telegram-chat-id }}
          token:     ${{ needs.build-staging.outputs.cicd-bot-telegram-token }}
          text:      '🏗️ Staging built: '
          link-url:  ${{ github.event.head_commit.url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          link-text: '${{ github.workflow }}'
          suffix:    ' on ${{ github.head_ref || github.ref_name }} by ${{ steps.extract_git_ref.outputs.author }}'

      - name: Notify Telegram (failure)
        if: ${{ failure() || contains(needs.*.result, 'failure') }}
        continue-on-error: true
        uses: simple-container-com/actions/notify-telegram@main
        with:
          chat-id:   ${{ needs.build-staging.outputs.cicd-bot-telegram-chat-id }}
          token:     ${{ needs.build-staging.outputs.cicd-bot-telegram-token }}
          text:      '❗ Staging failed: '
          link-url:  ${{ github.event.head_commit.url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          link-text: '${{ github.workflow }}'
          suffix:    ' on ${{ github.head_ref || github.ref_name }} by ${{ steps.extract_git_ref.outputs.author }}'

      - name: Build failed due to previously failed steps
        id: fail_if_needed
        if: ${{ failure() || contains(needs.*.result, 'failure') }}
        shell: bash
        run: |-
          exit 1
