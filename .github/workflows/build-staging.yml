name: Build GitHub Actions Staging Image (Blacksmith Optimized)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

# Least-privilege default for GITHUB_TOKEN; per-job `permissions:` block
# below extends with `id-token: write` + `attestations: write` for
# cosign keyless signing and attest-build-provenance.
permissions:
  contents: read

jobs:
  build-staging:
    name: Build Staging Image
    runs-on: blacksmith-8vcpu-ubuntu-2204
    permissions:
      contents: read
      id-token: write       # OIDC for keyless cosign + attest-build-provenance
      attestations: write
    outputs:
      cicd-bot-telegram-token: ${{ steps.prepare-additional-secrets.outputs.cicd-bot-telegram-token }}
      cicd-bot-telegram-chat-id: ${{ steps.prepare-additional-secrets.outputs.cicd-bot-telegram-chat-id }}

    steps:
      # Trust-root ref guard — mirrors the same guard in push.yaml. This
      # workflow signs `:staging` images under the cosign keyless identity
      # `build-staging.yml@refs/heads/staging`. workflow_dispatch from any
      # non-staging ref would publish an image signed with a different
      # identity that fails consumer verification.
      - name: Refuse to run on non-staging ref
        if: github.ref != 'refs/heads/staging'
        run: |
          echo "::error title=build-staging.yml restricted to staging::Got github.ref=$GITHUB_REF; this workflow signs :staging images under the staging trust root (refs/heads/staging only). Re-dispatch from staging."
          exit 1

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go with Blacksmith caching
        uses: useblacksmith/setup-go@647ac649bd5b480f2a262e3e3e5f4d150ed452ad  # v6.0.1
        with:
          go-version: '1.24'

      - name: Set version for build
        id: version
        run: |
          # Expose VERSION via BOTH $GITHUB_OUTPUT (consumed by `with:` blocks
          # of later steps — `env.VERSION` would also work but actionlint
          # cannot statically prove a $GITHUB_ENV-set var is present, so the
          # step-output form keeps the IDE clean) AND $GITHUB_ENV (so the
          # existing shell-only steps that reference $VERSION as a bare env
          # var keep working).
          VERSION="staging-${{ github.run_number }}-$(date -u +%Y%m%d-%H%M%S)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION"  >> "$GITHUB_ENV"
          echo "🏷️ Set VERSION: $VERSION"

      - name: Cache CLI tools (SC + Welder)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v4.3.0 (Automatically uses Blacksmith cache on Blacksmith runners)
        with:
          path: |
            ~/.local/bin/sc
            ~/.local/bin/welder
          key: cli-tools-${{ runner.os }}-v1
          restore-keys: |
            cli-tools-${{ runner.os }}-

      - name: install sc + welder tools
        uses: simple-container-com/actions/setup-sc-tooling@0af5a697f24ea484991660619d0ae42d50343b9d # main

      - name: Prepare secrets for build
        run: |
          cat << EOF > ./.sc/cfg.default.yaml
          ${{ secrets.SC_CONFIG }}
          EOF
          cat << EOF > ./.sc/cfg.test.yaml
          ${{ secrets.SC_CONFIG }}
          EOF
          sc secrets reveal

      - name: Prepare additional secrets for notifications
        id: prepare-additional-secrets
        run: |
          echo "cicd-bot-telegram-token=$(sc stack secret-get -s dist cicd-bot-telegram-token)" >> $GITHUB_OUTPUT
          echo "cicd-bot-telegram-chat-id=$(sc stack secret-get -s dist cicd-bot-telegram-chat-id)" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx with advanced caching
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      - name: Build static github-actions binary with welder (cached Go modules)
        run: |
          echo "Building with VERSION: $VERSION"
          welder run build-github-actions-staging

      - name: Docker login using SC secrets
        run: |
          sc stack secret-get -s dist dockerhub-cicd-token | docker login --username simplecontainer --password-stdin

      - name: Build and push github-actions staging image
        id: build_gha_staging
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: github-actions-staging.Dockerfile
          platforms: linux/amd64
          tags: |
            simplecontainer/github-actions:staging
            simplecontainer/github-actions:${{ github.ref_name }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push caddy staging image
        id: build_caddy_staging
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: caddy.Dockerfile
          platforms: linux/amd64
          tags: |
            simplecontainer/caddy:staging
            simplecontainer/caddy:${{ steps.version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # Phase 2: sign + SBOM + SLSA provenance for staging images. Staging has
      # its OWN trust root (build-staging.yml@refs/heads/staging) — consumers
      # who opt in to `:staging` images verify against the staging identity
      # regex, not the production one (push.yaml@refs/heads/main). See
      # SECURITY.md "Identity regex contract".
      - name: Install attestation tools
        id: install_attest_tools
        if: steps.build_gha_staging.outcome == 'success' || steps.build_caddy_staging.outcome == 'success'
        continue-on-error: true   # Best-effort during Phase 2 bake-in (matches push.yaml).
        uses: simple-container-com/actions/install-attest-tools@0af5a697f24ea484991660619d0ae42d50343b9d # main

      - name: Sign + attest github-actions staging (SBOM + cosign + SLSA)
        id: signattest_gha_staging
        if: steps.build_gha_staging.outcome == 'success'
        uses: simple-container-com/actions/sign-and-attest@0af5a697f24ea484991660619d0ae42d50343b9d # main
        with:
          image-ref: simplecontainer/github-actions@${{ steps.build_gha_staging.outputs.digest }}
          image-name: github-actions-staging
          subject-name: index.docker.io/simplecontainer/github-actions
          subject-digest: ${{ steps.build_gha_staging.outputs.digest }}
          # cosign + syft already installed by the step above; skip re-install.
          install-tools: 'false'
          # Phase 2 bake-in soft-fail. Mirrors push.yaml.
          soft-fail: 'true'

      - name: Sign + attest caddy staging (SBOM + cosign + SLSA)
        id: signattest_caddy_staging
        if: steps.build_caddy_staging.outcome == 'success'
        uses: simple-container-com/actions/sign-and-attest@0af5a697f24ea484991660619d0ae42d50343b9d # main
        with:
          image-ref: simplecontainer/caddy@${{ steps.build_caddy_staging.outputs.digest }}
          image-name: caddy-staging
          subject-name: index.docker.io/simplecontainer/caddy
          subject-digest: ${{ steps.build_caddy_staging.outputs.digest }}
          install-tools: 'false'
          soft-fail: 'true'

      - name: Soft-fail aggregator for staging attestation
        if: always()
        env:
          GHA_SBOM_OUTCOME: ${{ steps.signattest_gha_staging.outputs.sbom-outcome }}
          GHA_SIGN_OUTCOME: ${{ steps.signattest_gha_staging.outputs.sign-outcome }}
          GHA_ATTEST_OUTCOME: ${{ steps.signattest_gha_staging.outputs.attest-outcome }}
          GHA_SLSA_OUTCOME: ${{ steps.signattest_gha_staging.outputs.slsa-outcome }}
          CADDY_SBOM_OUTCOME: ${{ steps.signattest_caddy_staging.outputs.sbom-outcome }}
          CADDY_SIGN_OUTCOME: ${{ steps.signattest_caddy_staging.outputs.sign-outcome }}
          CADDY_ATTEST_OUTCOME: ${{ steps.signattest_caddy_staging.outputs.attest-outcome }}
          CADDY_SLSA_OUTCOME: ${{ steps.signattest_caddy_staging.outputs.slsa-outcome }}
        run: |
          fail=0
          for v in "$GHA_SBOM_OUTCOME" "$GHA_SIGN_OUTCOME" "$GHA_ATTEST_OUTCOME" "$GHA_SLSA_OUTCOME" \
                   "$CADDY_SBOM_OUTCOME" "$CADDY_SIGN_OUTCOME" "$CADDY_ATTEST_OUTCOME" "$CADDY_SLSA_OUTCOME"; do
            # Empty outcome means the parent step was skipped (its build_*_staging
            # parent was != success); treat as not-a-failure for the gate.
            [ -z "$v" ] && continue
            if [ "$v" != "success" ] && [ "$v" != "skipped" ]; then fail=1; fi
          done
          if [ "$fail" -eq 1 ]; then
            echo "::warning title=Staging attestation incomplete::gha=(sbom=$GHA_SBOM_OUTCOME sign=$GHA_SIGN_OUTCOME attest=$GHA_ATTEST_OUTCOME slsa=$GHA_SLSA_OUTCOME) caddy=(sbom=$CADDY_SBOM_OUTCOME sign=$CADDY_SIGN_OUTCOME attest=$CADDY_ATTEST_OUTCOME slsa=$CADDY_SLSA_OUTCOME)"
          else
            echo "Staging attestation complete."
          fi

      - name: Image built successfully
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "🎉 GitHub Actions and Caddy staging images built successfully with BuildKit + GitHub Actions caching!"
          echo ""
          echo "🚀 The staging images are now available:"
          echo "   simplecontainer/github-actions:staging"
          echo "   simplecontainer/github-actions:$REF_NAME"
          echo "   simplecontainer/caddy:staging"
          echo "   simplecontainer/caddy:$VERSION"
          echo ""
          echo "📦 Built with version: $VERSION"
          echo "✅ Your GitHub Actions will now use the updated staging image with your latest changes!"
          echo "⚡ Build was accelerated using:"
          echo "   • Blacksmith runner caching (Go modules, CLI tools)"
          echo "   • Docker BuildKit layer caching (GitHub Actions cache)"
          echo "   • Multi-platform optimized build"
          echo ""
          echo "📝 Next steps:"
          echo "   1. Test your GitHub Actions workflows"
          echo "   2. Push changes to main when ready for production"

  finalize:
    name: Finalize staging build
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - build-staging
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: ${{ always() }}
        with:
          persist-credentials: false

      - name: Extract git reference
        id: extract_git_ref
        if: ${{ always() }}
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.workflow_run.head_commit.message }}
        run: |-
          message="$(printf '%s' "$COMMIT_MESSAGE" | tr -d '\n')"
          echo "branch=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          echo "message=$message" >> $GITHUB_OUTPUT
          echo "author=$GITHUB_ACTOR" >> $GITHUB_OUTPUT
          echo "url=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> $GITHUB_OUTPUT

      - name: Notify Telegram (success)
        if: ${{ success() && !contains(needs.*.result, 'failure') }}
        continue-on-error: true
        uses: simple-container-com/actions/notify-telegram@0af5a697f24ea484991660619d0ae42d50343b9d # main
        with:
          chat-id:   ${{ needs.build-staging.outputs.cicd-bot-telegram-chat-id }}
          token:     ${{ needs.build-staging.outputs.cicd-bot-telegram-token }}
          text:      '🏗️ Staging built: '
          link-url:  ${{ github.event.head_commit.url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          link-text: '${{ github.workflow }}'
          suffix:    ' on ${{ github.head_ref || github.ref_name }} by ${{ steps.extract_git_ref.outputs.author }}'

      - name: Notify Telegram (failure)
        if: ${{ failure() || contains(needs.*.result, 'failure') }}
        continue-on-error: true
        uses: simple-container-com/actions/notify-telegram@0af5a697f24ea484991660619d0ae42d50343b9d # main
        with:
          chat-id:   ${{ needs.build-staging.outputs.cicd-bot-telegram-chat-id }}
          token:     ${{ needs.build-staging.outputs.cicd-bot-telegram-token }}
          text:      '❗ Staging failed: '
          link-url:  ${{ github.event.head_commit.url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          link-text: '${{ github.workflow }}'
          suffix:    ' on ${{ github.head_ref || github.ref_name }} by ${{ steps.extract_git_ref.outputs.author }}'

      - name: Build failed due to previously failed steps
        id: fail_if_needed
        if: ${{ failure() || contains(needs.*.result, 'failure') }}
        shell: bash
        run: |-
          exit 1
