name: Simple Forge Agent
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from the queue'
        required: true
        type: string
      issue_id:
        description: 'GitHub issue ID'
        required: true
        type: string
      branch:
        description: 'Target branch for changes'
        required: true
        type: string
      service_url:
        description: 'Simple Forge service URL'
        required: true
        type: string
        default: 'https://forge.simple-container.com'
      model_name:
        description: 'Claude model to use for generation'
        required: false
        default: 'claude-sonnet-4-5'
      script_version:
        description: 'Script version to use'
        required: false
        type: string
        default: 'latest'
      api_token:
        description: 'JWT token for both AI gateway and forge service API access'
        required: false
        type: string
      anthropic_base_url:
        description: 'Anthropic API base URL (overrides secrets if provided)'
        required: false
        type: string

# Least-privilege default for GITHUB_TOKEN; this workflow uses a PAT for the
# checkout (line ~49) and doesn't write back via GITHUB_TOKEN. Per-job
# overrides extend below if a step ever needs more.
permissions:
  contents: read

jobs:
  generate-code:
    runs-on: blacksmith-8vcpu-ubuntu-2204
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go with Blacksmith Cache
        uses: useblacksmith/setup-go@647ac649bd5b480f2a262e3e3e5f4d150ed452ad  # v6.0.1
        with:
          go-version: '1.25'

      - name: Install welder
        uses: simple-container-com/actions/install-welder@0af5a697f24ea484991660619d0ae42d50343b9d # main

      - name: Run Simple Forge
        uses: simple-container-com/forge-action/.github/actions/dockerless@b85c96d5f597a28e9dc7528b818c5c79e6575ad5 # v1
        with:
          job_id: ${{ inputs.job_id }}
          issue_id: ${{ inputs.issue_id }}
          service_url: "${{ inputs.service_url || 'https://forge.simple-container.com' }}"
          model_name: ${{ inputs.model_name }}
          branch: ${{ inputs.branch }}
          anthropic_api_key: ${{ inputs.api_token || secrets.ANTHROPIC_API_KEY }}
          anthropic_base_url: ${{ inputs.anthropic_base_url || secrets.ANTHROPIC_BASE_URL || format('{0}/ai', inputs.service_url || 'https://forge.simple-container.com') || 'https://api.anthropic.com' }}
          simple_forge_api_key: ${{ inputs.api_token || secrets.SIMPLE_FORGE_API_KEY }}
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script_version: ${{ inputs.script_version }}
          skip_dependency_install: 'false'
