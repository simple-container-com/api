version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps
      include: scope
    groups:
      # Batch ALL bumps from our own shared-actions repo into ONE PR per
      # actions-repo release. Dependabot resolves `patterns:` before
      # `update-types:`, so simple-container-com/actions/* bumps land
      # here regardless of major/minor/patch; everything else falls
      # through to `actions-minor-and-patch` below. This is the
      # ergonomic fix for the 21+ `uses:` refs to this single upstream:
      # one bot PR per release, not one per ref.
      simple-container-com-actions:
        applies-to: version-updates
        patterns:
          - "simple-container-com/actions"
          - "simple-container-com/actions/*"
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    commit-message:
      prefix: deps
      include: scope
    groups:
      gomod-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # Container images we publish from this repo. The 5 *.Dockerfile files
  # at the repo root (caddy, cloud-helpers.aws, github-actions,
  # github-actions-staging, kubectl) build production images. The
  # Dockerfiles under docs/docs/examples/ are user-facing samples, not
  # production artifacts — Dependabot will only pick up the ones at the
  # configured directory level (`/`), so example Dockerfiles are
  # implicitly out of scope.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: deps
      include: scope
    groups:
      docker-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # Python tooling for the docs site (MkDocs + Material + plugins).
  # Public site, so CVEs in the build chain still matter.
  - package-ecosystem: pip
    directory: /docs
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
      - docs
    commit-message:
      prefix: deps
      include: scope
    groups:
      pip-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
