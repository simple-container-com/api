run:
  skip-files: [ ]
  timeout: 5m
  concurrency: 4

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - ineffassign
    - gofumpt
    - gosimple
    - unused
    - staticcheck
    - gci
    - goheader

linters-settings:
  goheader:
    # Enforces the per-file SPDX + copyright header on every source file
    # (OpenSSF Gold: license_per_file + copyright_per_file). Year-less by design
    # so it is set-once and never needs an annual bump. Generated mocks are
    # excluded below (issues.exclude-rules) — they carry the generator header.
    template: |-
      SPDX-License-Identifier: MIT
      Copyright (c) Simple Container
  gci:
    sections:
      - standard # Standard section: captures all standard packages.
      - default # Default section: contains all imports that could not be matched to another section type.
      - prefix(github.com) # Custom section: groups all imports with the specified Prefix.
      - prefix(github.com/aws) # Custom section: groups all imports with the specified Prefix.
      - prefix(github.com/pulumi) # Custom section: groups all imports with the specified Prefix.
      - prefix(github.com/simple-container-com) # Custom section: groups all imports with the specified Prefix.
      # - blank # Blank section: contains all blank imports. This section is not present unless explicitly enabled.
      # - dot # Dot section: contains all dot imports. This section is not present unless explicitly enabled.
    skip-generated: false
    custom-order: true
  revive:
    rules:
      - name: var-naming # usually this is not critical
        disabled: true

issues:
  exclude-rules:
    # Auto-generated mocks carry the mockery "Code generated" header and are
    # regenerated by `go generate`; they get no SPDX/copyright header.
    - path: mocks/
      linters:
        - goheader